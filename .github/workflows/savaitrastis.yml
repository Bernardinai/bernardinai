name: Savaitrascio Generatorius

on:
  schedule:
    # 18:00 UTC laiku lygu 21:00 Lietuvos vasaros laiku
    - cron: '0 18 * * 5'
  workflow_dispatch: # Leidžia paleisti rankiniu būdu

permissions:
  contents: write

jobs:
  kurti-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Atsisiunčiami repozitorijos failai
        uses: actions/checkout@v4

      - name: 2. Paruošiama Python aplinka
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Diegiamos Linux sistemos bibliotekos (WeasyPrint varikliui)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz-subset0

      - name: 4. Diegiamos Python bibliotekos
        run: |
          python -m pip install --upgrade pip
          pip install feedparser weasyprint

      - name: 5. Generuojamas savaitraštis
        run: python naujienlaiskis.py

      - name: 6. Išsaugomas PDF atgal į repozitoriją
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add kulturos_savaitrastis_zurnalas.pdf
          if ! git diff --staged --quiet; then
            git commit -m "Automatinis PDF savaitraščio sukūrimas"
            git pull --rebase origin main
            git push
          fi
