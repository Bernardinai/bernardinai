name: Savaitrascio Generatorius

on:
  schedule:
    # Žadiname agentą ir 05:00, ir 06:00 UTC (šeštadienį)
    - cron: '0 5,6 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  kurti-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Atsisiunčiami repozitorijos failai
        uses: actions/checkout@v4

      - name: 2. Paruošiama Python aplinka
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Diegiamos Linux sistemos bibliotekos (WeasyPrint varikliui)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz-subset0

      - name: 4. Diegiamos Python bibliotekos
        run: |
          python -m pip install --upgrade pip
          pip install feedparser weasyprint tzdata

      - name: 5. Generuojamas savaitraštis
        env:
          MAILERLITE_API_KEY: ${{ secrets.MAILERLITE_API_KEY }}
          EVENT_NAME: ${{ github.event_name }}
        run: python naujienlaiskis.py

      - name: 6. Išsaugomas PDF ir skaitiklis atgal į repozitoriją
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add kulturos_savaitrastis_zurnalas.pdf leidinio_numeris.txt archyvas/
          if ! git diff --staged --quiet; then
            git commit -m "Automatinis PDF savaitraščio sukūrimas, archyvavimas ir skaitiklio atnaujinimas"
            git pull --rebase origin main
            git push
          fi
