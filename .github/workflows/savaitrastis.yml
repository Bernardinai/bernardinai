name: Savaitrascio Generatorius

on:
  schedule:
    - cron: '0 5,6 * * 6'
  workflow_dispatch:
    inputs:
      tikras_leidinys:
        description: 'Pazymeti, jei norite isleisti TIKRA numeri'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  kurti-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Atsisiunciami repozitorijos failai
        uses: actions/checkout@v4

      - name: 2. Paruosiama Python aplinka
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Diegiamos Linux sistemos bibliotekos
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz-subset0

      - name: 4. Diegiamos Python bibliotekos
        run: |
          python -m pip install --upgrade pip
          pip install feedparser weasyprint tzdata

      - name: 5. Generuojamas savaitrastis
        env:
          MAILERLITE_API_KEY: ${{ secrets.MAILERLITE_API_KEY }}
          EVENT_NAME: ${{ github.event_name }}
          TIKRAS_LEIDINYS: ${{ github.event.inputs.tikras_leidinys }}
        run: python naujienlaiskis.py

      - name: 6. Issaugomas archyvas repozitorijoje
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add archyvas/ leidinio_numeris.txt
          if ! git diff --staged --quiet; then
            git commit -m "Automatinis PDF archyvo papildymas"
            git pull --rebase origin main
            git push
          fi

      - name: 7. FTP ikelimas i serveri
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./archyvas/
          server-dir: ./
          state-name: .ftp-deploy-sync-state-archyvas.json
